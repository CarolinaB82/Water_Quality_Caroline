name: CI Water Quality Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  ci-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install light dependencies
        run: |
          pip install pandas requests fastapi uvicorn python-dotenv great-expectations pyspark

      - name: Check Python syntax
        run: |
          python -m compileall src api

      - name: Check important imports
        run: |
          python -c "import pandas"
          python -c "import pyspark"
          python -c "import great_expectations"
          python -c "import fastapi"
          python -c "import requests"
          python -c "from dotenv import load_dotenv"

      - name: Check sensitive files are not committed
        run: |
          test ! -f .env